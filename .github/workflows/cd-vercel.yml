name: CD-Vercel

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: cd-vercel-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate Deployment Secrets
        id: validate
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "One or more Vercel secrets are missing; skipping deploy."
          else
            echo "missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel Environment
        if: steps.validate.outputs.missing == 'false'
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel Prebuilt Output
        if: steps.validate.outputs.missing == 'false'
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel Production
        if: steps.validate.outputs.missing == 'false'
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Deployment Skipped Notice
        if: steps.validate.outputs.missing == 'true'
        run: echo "CD skipped because Vercel secrets are not configured."
