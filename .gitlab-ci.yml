workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: never

stages:
  - quality
  - build
  - deploy

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  NEXT_TELEMETRY_DISABLED: "1"

default:
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/
  before_script:
    - npm ci

lint:
  stage: quality
  script:
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

test:
  stage: quality
  variables:
    NODE_ENV: "test"
  script:
    - npm run test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

build:
  stage: build
  script:
    - npm run build
  needs:
    - lint
    - test
  artifacts:
    expire_in: 7 days
    paths:
      - .next/
      - package.json
      - package-lock.json
      - documents/week4_release_checklist.md
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

deploy_preview:
  stage: deploy
  needs:
    - build
  script:
    - set -eu
    - |
      if [ -z "${VERCEL_TOKEN:-}" ] || [ -z "${VERCEL_ORG_ID:-}" ] || [ -z "${VERCEL_PROJECT_ID:-}" ]; then
        echo "ERROR: Missing VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID for preview deploy."
        echo "Tip: check GitLab Variables scope (Protected) and branch protection."
        exit 1
      fi
    - echo "VERCEL_ORG_ID=${VERCEL_ORG_ID}"
    - echo "VERCEL_PROJECT_ID=${VERCEL_PROJECT_ID}"
    - npx vercel --version
    - npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
    - npx vercel build --token="$VERCEL_TOKEN"
    - |
      DEPLOY_OUTPUT="$(npx vercel deploy --prebuilt --yes --token="$VERCEL_TOKEN")"
      echo "$DEPLOY_OUTPUT"
      DEPLOY_URL="$(echo "$DEPLOY_OUTPUT" | tr -d '\r' | tail -n 1)"
      case "$DEPLOY_URL" in
        https://*) ;;
        *)
          DEPLOY_URL="$(echo "$DEPLOY_OUTPUT" | tr -d '\r' | grep -Eo 'https://[^[:space:]]+' | tail -n 1 || true)"
          ;;
      esac
      if [ -z "$DEPLOY_URL" ]; then
        echo "ERROR: Cannot parse deployment URL from Vercel output."
        exit 1
      fi
      echo "Preview Deployment URL: $DEPLOY_URL"
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "main" && $CI_COMMIT_BRANCH != "master"
      when: on_success

deploy_production:
  stage: deploy
  needs:
    - build
  environment:
    name: production
  script:
    - set -eu
    - |
      if [ -z "${VERCEL_TOKEN:-}" ] || [ -z "${VERCEL_ORG_ID:-}" ] || [ -z "${VERCEL_PROJECT_ID:-}" ]; then
        echo "ERROR: Missing VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID for production deploy."
        echo "Tip: check GitLab Variables scope (Protected) and branch protection."
        exit 1
      fi
    - echo "VERCEL_ORG_ID=${VERCEL_ORG_ID}"
    - echo "VERCEL_PROJECT_ID=${VERCEL_PROJECT_ID}"
    - npx vercel --version
    - npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
    - npx vercel build --prod --token="$VERCEL_TOKEN"
    - |
      DEPLOY_OUTPUT="$(npx vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN")"
      echo "$DEPLOY_OUTPUT"
      DEPLOY_URL="$(echo "$DEPLOY_OUTPUT" | tr -d '\r' | tail -n 1)"
      case "$DEPLOY_URL" in
        https://*) ;;
        *)
          DEPLOY_URL="$(echo "$DEPLOY_OUTPUT" | tr -d '\r' | grep -Eo 'https://[^[:space:]]+' | tail -n 1 || true)"
          ;;
      esac
      if [ -z "$DEPLOY_URL" ]; then
        echo "ERROR: Cannot parse deployment URL from Vercel output."
        exit 1
      fi
      echo "Production Deployment URL: $DEPLOY_URL"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
      when: manual
    - if: $CI_COMMIT_TAG
      when: on_success
